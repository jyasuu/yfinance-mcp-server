name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: yfinance-mcp
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/yfinance-mcp

jobs:
  check:
    name: Check build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "yfinance-mcp"

      - name: Build (glibc)
        run: cargo build --locked --release
        working-directory: yfinance-mcp

  release:
    name: Release
    if: github.event_name != 'pull_request'
    needs: [check]
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (musl)
        uses: docker/build-push-action@v6
        with:
          context: yfinance-mcp
          load: true
          tags: yfinance-mcp:build

      - name: Extract musl binary from Docker image
        run: |
          docker create --name extract yfinance-mcp:build
          docker cp extract:/usr/local/bin/yfinance-mcp ./${{ env.BINARY_NAME }}-linux-amd64
          docker rm extract
          tar czf ${{ env.BINARY_NAME }}-linux-amd64.tar.gz ${{ env.BINARY_NAME }}-linux-amd64

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' yfinance-mcp/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-amd64
          path: ${{ env.BINARY_NAME }}-linux-amd64

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.BINARY_NAME }} ${{ github.ref_name }}
          body: |
            See the [commit list](https://github.com/${{ github.repository }}/compare/${{ github.ref_name }}) for changes.
          files: |
            ${{ env.BINARY_NAME }}-linux-amd64.tar.gz
          fail_on_unmatched_files: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: yfinance-mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
