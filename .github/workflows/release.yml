name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: yfinance-mcp
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/yfinance-mcp

jobs:
  build:
    name: Build binary
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - run: rustup show

      - name: Build release
        run: cargo build --release
        working-directory: yfinance-mcp

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' yfinance-mcp/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-amd64
          path: yfinance-mcp/target/release/${{ env.BINARY_NAME }}

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    permissions:
      contents: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-amd64

      - name: Package binary
        run: |
          mv ${{ env.BINARY_NAME }} ${{ env.BINARY_NAME }}-linux-amd64
          tar czf ${{ env.BINARY_NAME }}-linux-amd64.tar.gz ${{ env.BINARY_NAME }}-linux-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.BINARY_NAME }} ${{ github.ref_name }}
          body: |
            See the [commit list](https://github.com/${{ github.repository }}/compare/${{ github.ref_name }}) for changes.
          files: |
            ${{ env.BINARY_NAME }}-linux-amd64.tar.gz
          fail_on_unmatched_files: true

  docker:
    name: Build & Push Docker image
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: yfinance-mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
